version: 2.1
orbs:
  python: circleci/python@4.0.0
jobs:
  pypi_publish:
    executor:
      name: python/default
      tag: '3.14'
    steps:
      - checkout
      - python/install-packages:
          args: twine build
          pkg-manager: pipenv
      - run:
          command: |  # create whl and publish to PyPI
            python -m build
            pipenv run twine upload dist/*
workflows:
  main:
    jobs:
      - pypi_publish:
          filters:
            branches:
              only:
                - master
